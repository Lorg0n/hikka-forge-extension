kind: pipeline
type: docker
name: build-and-publish

trigger:
  event:
    - tag
  ref:
    - refs/tags/v*

steps:
  - name: build-and-package
    image: node:20-slim
    commands:
      - apt-get update && apt-get install -y zip git
      - npm install -g pnpm
      - pnpm install
      - pnpm run build:chrome
      - pnpm run build:firefox
      - |
        cd dist/chrome
        zip -r ../hikka-forge-chrome-${DRONE_TAG}.zip .
        cd ../..
      - |
        cd dist/firefox
        zip -r ../hikka-forge-firefox-${DRONE_TAG}.zip .
        cd ../..
      - |
        git archive -o dist/source-code-${DRONE_TAG}.zip HEAD

  - name: publish-to-chrome-store
    image: node:20-slim
    environment:
      EXTENSION_ID:
        from_secret: CWS_EXTENSION_ID
      CLIENT_ID:
        from_secret: CWS_CLIENT_ID
      CLIENT_SECRET:
        from_secret: CWS_CLIENT_SECRET
      REFRESH_TOKEN:
        from_secret: CWS_REFRESH_TOKEN
      PUBLISHER_ID:
        from_secret: CWS_PUBLISHER_ID
    commands:
      - npm install -g chrome-webstore-upload-cli@4.0.0
      - chrome-webstore-upload upload --source dist/hikka-forge-chrome-${DRONE_TAG}.zip
      - chrome-webstore-upload publish --extension-id $EXTENSION_ID

