  - name: publish-to-firefox-store
    image: node:20-slim
    environment:
      AMO_JWT_ISSUER:
        from_secret: AMO_JWT_ISSUER
      AMO_JWT_SECRET:
        from_secret: AMO_JWT_SECRET
    commands:
      - npm install -g web-ext
      - >
        web-ext sign
        --source-dir=dist/firefox
        --channel=listed
        --api-key=$AMO_JWT_ISSUER
        --api-secret=$AMO_JWT_SECRET